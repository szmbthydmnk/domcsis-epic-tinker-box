name: python mypy

on:
    workflow_dispatch: 

    push:
        branches: [main]
        paths:
            - '**/*.py'
            - 'python/pyproject.toml'
            - 'mypy.ini'
            - '.github/workflows/python-mypy.yml'
    
    pull_request: 
        branches: [main]
        paths:
            - '**/*.py'
            - 'python/pyproject.toml'
            - 'mypy.ini'
            - '.github/workflows/python-mypy.yml'

jobs:
    mypy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.11'

            - name: Install dependencies
              # Install the package in editable mode with all dev extras so that
              # mypy can resolve every import at type-check time.  Installing via
              # ".[dev]" is preferable to a hand-maintained list here because
              # pyproject.toml is the single source of truth for dependencies.
              working-directory: python
              run: |
                python -m pip install --upgrade pip
                pip install -e ".[dev]"

            - name: Run mypy
              # Run from the python/ subdirectory so that mypy discovers
              # pyproject.toml automatically (it walks up from the invocation
              # directory).  Without this, the [[tool.mypy.overrides]] blocks
              # that suppress import-not-found for qiskit* are silently ignored
              # and every qiskit import is reported as an error.
              working-directory: python
              run: |
                mypy --strict src
