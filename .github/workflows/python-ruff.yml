name: Python Ruff

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'ruff.toml'
      - '.ruff.toml'
      - '.github/workflows/python-ruff.yml'

  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'ruff.toml'
      - '.ruff.toml'
      - '.github/workflows/python-ruff.yml'

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check --output-format=github .
