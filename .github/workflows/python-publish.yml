name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !startsWith(github.ref_name, 'julia-') }}
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Assert version matches tag
        run: |
          PKG_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${GITHUB_REF_NAME#python-v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VER) != tag ($TAG_VER)"
            echo "Bump version in python/pyproject.toml to $TAG_VER before tagging."
            exit 1
          fi
          echo "Version check passed: $PKG_VER"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          skip-existing: true
