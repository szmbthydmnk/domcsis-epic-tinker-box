name: Julia LoC metrics

on:
  workflow_dispatch:

  push:
    branches: [main]
    tags: ['julia-v*']
    paths:
      - 'julia/**/*.jl'
      - '.github/workflows/julia-loc.yml'

jobs:
  loc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Count lines of code
        run: cloc julia/src/ julia/test/ --include-lang=Julia
