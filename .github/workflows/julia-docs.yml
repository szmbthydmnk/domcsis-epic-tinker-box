name: Julia docs

on:
  workflow_dispatch:

  push:
    branches: [main]
    tags: ['julia-v*']
    paths:
      - 'julia/**'
      - '.github/workflows/julia-docs.yml'

jobs:
  docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate package environment
        run: julia --project=julia -e 'using Pkg; Pkg.instantiate()'

      - name: Dev local package into docs environment
        run: julia --project=julia/docs -e 'using Pkg; Pkg.develop(PackageSpec(path="julia")); Pkg.instantiate()'

      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=julia/docs julia/docs/make.jl
