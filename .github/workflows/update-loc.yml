name: LOC

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  count-loc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cloc and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc jq

      - name: Extract LOC stats
        id: loc
        run: |
          cloc . \
            --include-lang=Python,Julia \
            --json \
            --out=cloc.json

          python_comment=$(jq '.Python.comment // 0' cloc.json)
          python_code=$(jq '.Python.code // 0' cloc.json)

          julia_comment=$(jq '.Julia.comment // 0' cloc.json)
          julia_code=$(jq '.Julia.code // 0' cloc.json)

          python_total_nonblank=$((python_code + python_comment))
          julia_total_nonblank=$((julia_code + julia_comment))

          if [ "$python_total_nonblank" -eq 0 ]; then
            python_code_pct="N/A"
          else
            python_code_pct=$(awk "BEGIN { printf \"%.1f%%\", 100 * $python_code / $python_total_nonblank }")
          fi

          if [ "$julia_total_nonblank" -eq 0 ]; then
            julia_code_pct="N/A"
          else
            julia_code_pct=$(awk "BEGIN { printf \"%.1f%%\", 100 * $julia_code / $julia_total_nonblank }")
          fi

          echo "python_code=$python_code" >> "$GITHUB_OUTPUT"
          echo "python_code_pct=$python_code_pct" >> "$GITHUB_OUTPUT"
          echo "julia_code=$julia_code" >> "$GITHUB_OUTPUT"
          echo "julia_code_pct=$julia_code_pct" >> "$GITHUB_OUTPUT"

      - name: Update README metrics
        run: |
          python_metric="${{ steps.loc.outputs.python_code }} LOC, code share = ${{ steps.loc.outputs.python_code_pct }}"
          julia_metric="${{ steps.loc.outputs.julia_code }} LOC, code share = ${{ steps.loc.outputs.julia_code_pct }}"

          sed -i "s|<!-- PYTHON_METRIC -->.*<!-- /PYTHON_METRIC -->|<!-- PYTHON_METRIC -->${python_metric}<!-- /PYTHON_METRIC -->|" README.md
          sed -i "s|<!-- JULIA_METRIC -->.*<!-- /JULIA_METRIC -->|<!-- JULIA_METRIC -->${julia_metric}<!-- /JULIA_METRIC -->|" README.md

      - name: Show README diff
        run: git diff -- README.md
