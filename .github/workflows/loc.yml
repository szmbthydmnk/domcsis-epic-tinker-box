name: LOC

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'python/**/*.py'
      - 'julia/**/*.jl'
      - '**/*.py'
      - '**/*.jl'
      - 'python/pyproject.toml'
      - 'Project.toml'
      - 'Manifest.toml'
      - '.github/workflows/loc.yml'

  pull_request:
    branches: [main]
    paths:
      - 'python/**/*.py'
      - 'julia/**/*.jl'
      - '**/*.py'
      - '**/*.jl'
      - 'python/pyproject.toml'
      - 'Project.toml'
      - 'Manifest.toml'
      - '.github/workflows/loc.yml'

jobs:
  count-loc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install cloc and jq
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc jq

      - name: Extract LOC stats
        id: loc
        working-directory: ${{ github.workspace }}
        run: |
          cloc . \
            --include-lang=Python,Julia \
            --json \
            --out=cloc.json

          python_comment=$(jq '.Python.comment // 0' cloc.json)
          python_code=$(jq '.Python.code // 0' cloc.json)

          julia_comment=$(jq '.Julia.comment // 0' cloc.json)
          julia_code=$(jq '.Julia.code // 0' cloc.json)

          python_total_nonblank=$((python_code + python_comment))
          julia_total_nonblank=$((julia_code + julia_comment))

          if [ "$python_total_nonblank" -eq 0 ]; then
            python_code_pct="N/A"
          else
            python_code_pct=$(awk "BEGIN { printf \"%.1f%%\", 100 * $python_code / $python_total_nonblank }")
          fi

          if [ "$julia_total_nonblank" -eq 0 ]; then
            julia_code_pct="N/A"
          else
            julia_code_pct=$(awk "BEGIN { printf \"%.1f%%\", 100 * $julia_code / $julia_total_nonblank }")
          fi

          echo "python_code=$python_code" >> "$GITHUB_OUTPUT"
          echo "python_code_pct=$python_code_pct" >> "$GITHUB_OUTPUT"
          echo "julia_code=$julia_code" >> "$GITHUB_OUTPUT"
          echo "julia_code_pct=$julia_code_pct" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Count Python tests
        id: python_tests
        run: |
          test_count=$(python -m pytest tests/ --collect-only -q 2>/dev/null \
            | grep -E "^[0-9]+ test" \
            | grep -oE "^[0-9]+")

          if [ -z "$test_count" ]; then
            test_count=0
          fi

          echo "python_tests=$test_count" >> "$GITHUB_OUTPUT"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Count Julia tests
        id: julia_tests
        working-directory: ${{ github.workspace }}
        run: |
          julia --project=julia -e 'using Pkg; Pkg.instantiate()'

          test_count=$(julia --project=julia -e '
            function count_tests(dir)
              n = 0
              for (root, dirs, files) in walkdir(dir)
                for file in files
                  if endswith(file, ".jl")
                    content = read(joinpath(root, file), String)
                    n += length(collect(eachmatch(r"@test[\s_(]|@test_throws", content)))
                  end
                end
              end
              return n
            end
            println(count_tests("julia/test"))
          ')

          if [ -z "$test_count" ]; then
            test_count=0
          fi

          echo "julia_tests=$test_count" >> "$GITHUB_OUTPUT"

      - name: Update README metrics
        working-directory: ${{ github.workspace }}
        run: |
          python_metric="${{ steps.loc.outputs.python_code }} LOC, code share = ${{ steps.loc.outputs.python_code_pct }}"
          julia_metric="${{ steps.loc.outputs.julia_code }} LOC, code share = ${{ steps.loc.outputs.julia_code_pct }}"
          python_tests_metric="${{ steps.python_tests.outputs.python_tests }} tests"
          julia_tests_metric="${{ steps.julia_tests.outputs.julia_tests }} tests"

          sed -i "s|<!-- PYTHON_METRIC -->.*<!-- /PYTHON_METRIC -->|<!-- PYTHON_METRIC -->${python_metric}<!-- /PYTHON_METRIC -->|" README.md
          sed -i "s|<!-- JULIA_METRIC -->.*<!-- /JULIA_METRIC -->|<!-- JULIA_METRIC -->${julia_metric}<!-- /JULIA_METRIC -->|" README.md
          sed -i "s|<!-- PYTHON_TESTS -->.*<!-- /PYTHON_TESTS -->|<!-- PYTHON_TESTS -->${python_tests_metric}<!-- /PYTHON_TESTS -->|" README.md
          sed -i "s|<!-- JULIA_TESTS -->.*<!-- /JULIA_TESTS -->|<!-- JULIA_TESTS -->${julia_tests_metric}<!-- /JULIA_TESTS -->|" README.md

      - name: Show README diff
        working-directory: ${{ github.workspace }}
        run: git diff -- README.md

      - name: Commit and push README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "Update README metrics [skip ci]"
          git push

      - name: Copy README into python/
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          cp README.md python/README.md
          if git diff --quiet -- python/README.md; then
            echo "No python/README.md changes to commit."
            exit 0
          fi

          git add python/README.md
          git commit -m "Sync python/README.md from root [skip ci]"
          git push
